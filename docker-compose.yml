version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: m2e_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meeting2execution
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: m2e_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/meeting2execution
      - GEMINI_API_KEY=placeholder_key
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: m2e_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
